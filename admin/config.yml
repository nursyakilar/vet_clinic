backend:
  name: git-gateway
  branch: main

media_folder: "images"      # Folder where uploaded client images are stored
public_folder: "/images"

collections:
  - name: "homepage_data"
    label: "Edit Website Content"
    files:
      - file: "content.json"
        label: "Live Pricing & Text Alerts"
        name: "content_map"
        fields:
          - { label: "Top Status Banner Alert", name: "status_banner", widget: "string" }
          - { label: "Main Hero Heading Text", name: "hero_title", widget: "text" }
          - { label: "Consultation Base Price", name: "consult_price", widget: "string" }
          - { label: "Luxury Boarding Cost", name: "boarding_price", widget: "string" }
          - { label: "Boarding Room Availability Tracking", name: "boarding_slots", widget: "string" }
          - { label: "Vaccine Package Starting Cost", name: "vaccine_price", widget: "string" }
